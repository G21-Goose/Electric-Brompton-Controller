[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Choose one BLE stack. NimBLE recommended for lower memory usage.
lib_deps =
  h2zero/NimBLE-Arduino@^2.5.0

; If you prefer the original ESP32 BLE Arduino (Bluedroid) stack, replace the lib_deps line with:
;   nkolban/ESP32_BLE_Arduino@^1.0.1
